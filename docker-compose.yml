services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kratos
      POSTGRES_PASSWORD: kratos
      POSTGRES_DB: helloworld
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployments/sql:/docker-entrypoint-initdb.d:ro

volumes:
  postgres_data:
